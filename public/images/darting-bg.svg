<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <linearGradient id="dartAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>

    <linearGradient id="dartSoft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <filter id="blurStrong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>

    <filter id="blurSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bgGradient)" />

  <!-- Soft glow areas -->
  <ellipse cx="200" cy="150" rx="260" ry="180" fill="#38bdf8" opacity="0.18" filter="url(#blurStrong)" />
  <ellipse cx="1450" cy="750" rx="260" ry="180" fill="#22c55e" opacity="0.18" filter="url(#blurStrong)" />
  <ellipse cx="900" cy="450" rx="320" ry="220" fill="#0ea5e9" opacity="0.16" filter="url(#blurSoft)" />

  <!-- Darting streaks (accent) -->
  <g opacity="0.9" filter="url(#blurSoft)">
    <path d="M-100 260 L520 80" stroke="url(#dartAccent)" stroke-width="6" stroke-linecap="round" />
    <path d="M-40 310 L580 130" stroke="url(#dartAccent)" stroke-width="4" stroke-linecap="round" />
    <path d="M1020 520 L1720 320" stroke="url(#dartAccent)" stroke-width="6" stroke-linecap="round" />
    <path d="M980 580 L1680 380" stroke="url(#dartAccent)" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Darting streaks (soft) -->
  <g opacity="0.55" filter="url(#blurSoft)">
    <path d="M-120 540 L640 320" stroke="url(#dartSoft)" stroke-width="5" stroke-linecap="round" />
    <path d="M-60 600 L700 380" stroke="url(#dartSoft)" stroke-width="3" stroke-linecap="round" />
    <path d="M880 220 L1680 0" stroke="url(#dartSoft)" stroke-width="5" stroke-linecap="round" />
    <path d="M840 270 L1640 50" stroke="url(#dartSoft)" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Subtle diagonal grid lines -->
  <g opacity="0.12">
    <path d="M-200 820 L400 -40" stroke="#64748b" stroke-width="1" />
    <path d="M-80 880 L520 20" stroke="#64748b" stroke-width="1" />
    <path d="M160 900 L760 40" stroke="#64748b" stroke-width="1" />
    <path d="M400 900 L1000 40" stroke="#64748b" stroke-width="1" />
    <path d="M640 900 L1240 40" stroke="#64748b" stroke-width="1" />
    <path d="M880 900 L1480 40" stroke="#64748b" stroke-width="1" />
  </g>

  <!-- Center soft focus area for the card -->
  <rect x="400" y="180" width="800" height="540" rx="120" fill="#020617" opacity="0.55" filter="url(#blurStrong)" />
</svg>
